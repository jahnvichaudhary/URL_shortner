server.port=8080
server.address=0.0.0.0

# how many worker threads we spin up. bump this if you've got CPU to burn.
taskrunner.workers=4

# max retry attempts before we give up on a job
taskrunner.max-retries=3

# base backoff in millis (doubles each retry)
taskrunner.retry-backoff-ms=500

spring.application.name=taskrunner
spring.jackson.serialization.write-dates-as-timestamps=false
