spring:
  application:
    name: url-shortener


  datasource:
    url: jdbc:h2:mem:urlshortener;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""


  h2:
    console:
      enabled: true
      path: /h2-console


  jpa:

    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: 1000ms

  cache:
    type: redis
    redis:
      # Cache entries expire after 24 hours
      # 86400000 milliseconds = 24 hours
      time-to-live: 86400000

server:
  port: 8080


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: always


snowflake:
  datacenter-id: 1
  machine-id: 1

app:
  base-url: http://localhost:8080
  default-expiry-days: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

  h2:
    console:
      enabled: false

snowflake:
  datacenter-id: ${DATACENTER_ID:1}
  machine-id: ${MACHINE_ID:1}

app:
  base-url: ${BASE_URL:http://localhost:8080}
  default-expiry-days: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
